<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ITエンジニア アイコン & 企業ロゴ クイズ</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>ITエンジニア<br />アイコン・企業ロゴ クイズ</h1>
      <p class="subtitle">マスコット / IT企業 / 上級者 / アート職 / ポケカ立ち回り 各30問</p>
    </header>

    <!-- Start screen -->
    <section id="screen-start" class="screen active">
      <div class="category-grid">
        <button class="category-card" data-category="mascot" type="button">
          <div class="category-emoji">🐧🐹🦀</div>
          <div class="category-name">マスコット編</div>
          <div class="category-desc">
            Java の Duke / Linux の Tux / Go の Gopher / Rust の Ferris…
            IT 界のキャラクター & 技術ロゴ <strong>30問</strong>
          </div>
          <span class="category-cta">スタート →</span>
        </button>

        <button class="category-card" data-category="company" type="button">
          <div class="category-emoji">🏢💼🌐</div>
          <div class="category-name">IT企業編</div>
          <div class="category-desc">
            GAFAM / OpenAI / Stripe / 楽天 / メルカリ…
            世界・日本のIT企業ロゴ <strong>30問</strong>
          </div>
          <span class="category-cta">スタート →</span>
        </button>

        <button class="category-card category-card-advanced" data-category="advanced" type="button">
          <div class="category-emoji">🐉🦎🦖</div>
          <div class="category-name">上級者編</div>
          <div class="category-desc">
            Hexley / Konqi / Glenda / Puffy / Haskell / OCaml / Erlang / Terraform / Vault…
            マイナーマスコット & ニッチ言語 & DevOps <strong>30問</strong>
          </div>
          <span class="category-cta category-cta-advanced">挑戦する →</span>
        </button>

        <button class="category-card category-card-art" data-category="art" type="button">
          <div class="category-emoji">🎨🖌️🎬</div>
          <div class="category-name">アート職編</div>
          <div class="category-desc">
            Photoshop / Illustrator / Figma / Blender / Maya / Houdini / DaVinci / Procreate / Unity…
            デザイナー・3D・映像・ゲームアーティスト向け <strong>30問</strong>
          </div>
          <span class="category-cta category-cta-art">スタート →</span>
        </button>

        <button class="category-card category-card-poketcg" data-category="poketcg" type="button">
          <div class="category-emoji">🃏⚡🔥</div>
          <div class="category-name">ポケカ立ち回り編</div>
          <div class="category-desc">
            <strong>2026年5月環境</strong>のメタを反映。ドラパルト / カミツオロチ / タケルライコ / メガルカリオ / オリーヴァ etc. の対面で立ち回りを問う中〜上級向け <strong>30問</strong> (テキスト問題)
          </div>
          <span class="category-cta category-cta-poketcg">挑戦する →</span>
        </button>
      </div>
      <p class="hint-row">どちらも4択・所要約5分。途中で「もう一度挑戦する」を押すとカテゴリ選択に戻れます。</p>
    </section>

    <!-- Quiz screen -->
    <section id="screen-quiz" class="screen">
      <div class="progress">
        <div class="progress-info">
          <span id="q-counter">1 / 30</span>
          <span id="score-display">正解: 0</span>
        </div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      </div>

      <div class="card">
        <div class="image-frame">
          <img id="q-image" alt="quiz icon" />
        </div>
        <div id="q-scenario" class="scenario hidden"></div>
        <h3 id="q-prompt">このアイコン/マスコットはどの技術のもの?</h3>
        <div id="choices" class="choices"></div>
        <div id="feedback" class="feedback hidden"></div>
        <button id="btn-next" class="btn btn-primary hidden">次の問題 →</button>
      </div>
    </section>

    <!-- Result screen -->
    <section id="screen-result" class="screen">
      <div class="card">
        <h2 id="result-title">結果発表 🎉</h2>
        <div class="result-score">
          <span id="result-score">0</span>
          <span class="result-total" id="result-total"> / 30</span>
        </div>
        <p id="result-rank" class="result-rank"></p>
        <div id="review-list" class="review-list"></div>
        <button id="btn-restart" class="btn btn-primary">もう一度挑戦する</button>
      </div>
    </section>

    <footer class="footer">
      <small>画像出典: Wikimedia Commons / Simple Icons / GitHub Octodex / 各プロジェクト公式素材</small>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>

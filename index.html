<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ITエンジニア アイコン & 企業ロゴ クイズ</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>ITエンジニア<br />アイコン・企業ロゴ クイズ</h1>
      <p class="subtitle">マスコット30問 / IT企業30問 — どっちで遊ぶ?</p>
    </header>

    <!-- Start screen -->
    <section id="screen-start" class="screen active">
      <div class="category-grid">
        <button class="category-card" data-category="mascot" type="button">
          <div class="category-emoji">🐧🐹🦀</div>
          <div class="category-name">マスコット編</div>
          <div class="category-desc">
            Java の Duke / Linux の Tux / Go の Gopher / Rust の Ferris…
            IT 界のキャラクター & 技術ロゴ <strong>30問</strong>
          </div>
          <span class="category-cta">スタート →</span>
        </button>

        <button class="category-card" data-category="company" type="button">
          <div class="category-emoji">🏢💼🌐</div>
          <div class="category-name">IT企業編</div>
          <div class="category-desc">
            GAFAM / OpenAI / Stripe / 楽天 / メルカリ…
            世界・日本のIT企業ロゴ <strong>30問</strong>
          </div>
          <span class="category-cta">スタート →</span>
        </button>
      </div>
      <p class="hint-row">どちらも4択・所要約5分。途中で「もう一度挑戦する」を押すとカテゴリ選択に戻れます。</p>
    </section>

    <!-- Quiz screen -->
    <section id="screen-quiz" class="screen">
      <div class="progress">
        <div class="progress-info">
          <span id="q-counter">1 / 30</span>
          <span id="score-display">正解: 0</span>
        </div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      </div>

      <div class="card">
        <div class="image-frame">
          <img id="q-image" alt="quiz icon" />
        </div>
        <h3 id="q-prompt">このアイコン/マスコットはどの技術のもの?</h3>
        <div id="choices" class="choices"></div>
        <div id="feedback" class="feedback hidden"></div>
        <button id="btn-next" class="btn btn-primary hidden">次の問題 →</button>
      </div>
    </section>

    <!-- Result screen -->
    <section id="screen-result" class="screen">
      <div class="card">
        <h2 id="result-title">結果発表 🎉</h2>
        <div class="result-score">
          <span id="result-score">0</span>
          <span class="result-total" id="result-total"> / 30</span>
        </div>
        <p id="result-rank" class="result-rank"></p>
        <div id="review-list" class="review-list"></div>
        <button id="btn-restart" class="btn btn-primary">もう一度挑戦する</button>
      </div>
    </section>

    <footer class="footer">
      <small>画像出典: Wikimedia Commons / Simple Icons / GitHub Octodex / 各プロジェクト公式素材</small>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
